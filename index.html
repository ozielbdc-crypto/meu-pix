<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copiando Código PIX...</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px; background: #f4f7f6; color: #222; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); display: inline-block; max-width: 380px; }
        .sucesso { color: #00bfa5; font-size: 48px; margin-bottom: 10px; }
        .btn { background: #00bfa5; color: white; border: none; padding: 12px 30px; font-size: 16px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>
    <div class="card">
        <div class="sucesso">✓</div>
        <h2 style="margin:0 0 10px 0;">Código PIX Copiado!</h2>
        <p id="msg" style="font-size:14px; color:#666; line-height: 1.4;">Basta abrir o aplicativo do seu banco e colar na opção "PIX Copia e Cola".</p>
        <button class="btn" onclick="executarCopia()">Copiar Novamente</button>
    </div>

    <script>
        // Captura o parâmetro correto enviado pelo Node (?pix=...)
        const params = new URLSearchParams(window.location.search);
        let base64Data = params.get('pix');
        
        if (base64Data) {
            try {
                // Traduz o Base64 de volta para o formato original (000201...)
                const codigoPixOriginal = atob(base64Data);

                function executarCopia() {
                    navigator.clipboard.writeText(codigoPixOriginal).then(() => {
                        document.getElementById('msg').innerHTML = "<b>Copiado com sucesso!</b><br>Abra o app do seu banco e efetue o pagamento.";
                    }).catch(() => {
                        document.getElementById('msg').innerText = "Falha ao copiar automaticamente. Toque no botão verde abaixo.";
                    });
                }

                // Executa a cópia instantaneamente ao carregar a página no celular do cliente
                window.onload = executarCopia;
            } catch (e) {
                document.getElementById('msg').innerText = "Erro ao processar o código de pagamento.";
            }
        } else {
            document.getElementById('msg').innerText = "Nenhum código PIX foi detectado nesta URL.";
        }
    </script>
</body>
</html>
