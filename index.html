<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Código PIX Pronto!</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; text-align: center; padding: 40px 20px; background: #f8fafc; color: #1e293b; margin: 0; }
        .card { background: white; padding: 35px 25px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.05); display: inline-block; max-width: 360px; width: 100%; box-sizing: border-box; }
        .sucesso { color: #059669; font-size: 52px; margin-bottom: 15px; font-weight: bold; }
        .btn { background: #10b981; color: white; border: none; padding: 14px 20px; font-size: 15px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 25px; width: 100%; transition: background 0.2s, transform 0.1s; -webkit-tap-highlight-color: transparent; letter-spacing: 0.3px; }
        .btn:active { background: #047857; transform: scale(0.98); }
        textarea { position: absolute; left: -9999px; opacity: 0; }
        h2 { font-size: 22px; font-weight: 700; margin: 0 0 12px 0; color: #0f172a; }
        p { font-size: 14px; color: #64748b; line-height: 1.5; margin: 0; }
    </style>
</head>
<body>
    <div class="card">
        <div class="sucesso">✓</div>
        <h2 id="titulo">Código PIX Pronto!</h2>
        <p id="msg">Clique no botão verde abaixo para copiar o código e pagar no seu banco.</p>
        <button class="btn" id="btnCopiar" onclick="executarCopia()">COPIAR PIX</button>
    </div>

    <textarea id="inputOculto" readonly></textarea>

    <script>
        // Captura o parâmetro curto enviado pela URL (?p=...)
        const params = new URLSearchParams(window.location.search);
        let base64Data = params.get('p') || params.get('pix'); // Suporta tanto ?p= quanto ?pix= para segurança
        let codigoPixOriginal = "";

        if (base64Data) {
            try {
                // Decodifica o Base64 completo vindo do seu Node.js (com *** e CRC finais)
                codigoPixOriginal = atob(decodeURIComponent(base64Data));
                document.getElementById('inputOculto').value = codigoPixOriginal;
            } catch (e) {
                document.getElementById('msg').innerText = "Erro ao processar o código de pagamento.";
            }
        } else {
            document.getElementById('msg').innerText = "Nenhum código PIX válido foi detectado.";
            document.getElementById('btnCopiar').style.display = 'none';
        }

        function executarCopia() {
            const txtArea = document.getElementById('inputOculto');
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(codigoPixOriginal).then(() => {
                    sucessoVisual();
                }).catch(() => {
                    copiaMetodoAlternativo(txtArea);
                });
            } else {
                copiaMetodoAlternativo(txtArea);
            }
        }

        function copiaMetodoAlternativo(elemento) {
            try {
                elemento.select();
                elemento.setSelectionRange(0, 99999);
                const copiou = document.execCommand('copy');
                
                if (copiou) {
                    sucessoVisual();
                } else {
                    document.getElementById('msg').innerText = "Falha ao copiar. Segure o dedo sobre o código e copie manualmente.";
                }
            } catch (err) {
                document.getElementById('msg').innerText = "Erro ao copiar. Tente atualizar a página.";
            }
        }

        function sucessoVisual() {
            document.getElementById('msg').innerHTML = "<span style='color:#059669; font-weight:600;'>✅ Código copiado com sucesso!</span><br><br>Agora abra o aplicativo do seu banco, escolha a opção <b>PIX Copia e Cola</b> e cole o código para pagar.";
            
            const botao = document.getElementById('btnCopiar');
            botao.innerText = "COPIADO!";
            botao.style.background = "#047857";
        }
    </script>
</body>
</html>
